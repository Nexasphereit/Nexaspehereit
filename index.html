<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexaSphere | Smart Documents</title>
    <script>
      // Early-stage sandboxed iframe compatibility hotfix for "window.fetch has only a getter"
      (function() {
        if (typeof window === 'undefined') return;
        try {
          var originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return window.__customFetch || originalFetch;
            },
            set: function(val) {
              window.__customFetch = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          try {
            Object.defineProperty(Window.prototype, 'fetch', {
              get: function() {
                return this.__customFetch || originalFetch;
              },
              set: function(val) {
                this.__customFetch = val;
              },
              configurable: true,
              enumerable: true
            });
          } catch (e2) {}
        }
      })();

      // Prevent uncaught errors from being outputted or breaking client bundle execution
      window.onerror = function(message, source, lineno, colno, error) {
        var str = String(message || "");
        if (
          str.indexOf("Cannot set property fetch") !== -1 ||
          str.indexOf("is read-only") !== -1 ||
          str.indexOf("has only a getter") !== -1
        ) {
          console.warn("Swallowed sandboxed fetch assignment error via onerror:", message);
          return true; // Prevents the error from crashing the preview or flooding logs
        }
      };

      window.addEventListener('error', function(event) {
        if (event && event.message && (
          event.message.includes("Cannot set property fetch") || 
          event.message.includes("is read-only") || 
          event.message.includes("has only a getter")
        )) {
          event.preventDefault();
          event.stopPropagation();
          console.warn("Swallowed sandbox fetch assignment warning in event:", event.message);
        }
      }, true);

      window.addEventListener('unhandledrejection', function(event) {
        if (event && event.reason) {
          var msg = String(event.reason.message || event.reason);
          if (
            msg.indexOf("Cannot set property fetch") !== -1 ||
            msg.indexOf("is read-only") !== -1 ||
            msg.indexOf("has only a getter") !== -1
          ) {
            event.preventDefault();
            console.warn("Swallowed sandboxed fetch assignment rejection:", msg);
          }
        }
      });

      // Bulletproof workaround for circular JSON serialization errors thrown by telemetry/logging tools
      (function() {
        var originalStringify = JSON.stringify;
        JSON.stringify = function(value, replacer, space) {
          var seen = new WeakSet();
          try {
            return originalStringify(value, function(key, val) {
              if (typeof val === "object" && val !== null) {
                if (seen.has(val)) {
                  return "[Circular]";
                }
                seen.add(val);
              }
              if (typeof replacer === "function") {
                return replacer(key, val);
              }
              return val;
            }, space);
          } catch (e) {
            return originalStringify({ error: "Serialization failed", details: e.message });
          }
        };
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
