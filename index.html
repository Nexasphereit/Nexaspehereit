<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NexaSphere | Smart Documents</title>
    <script>
      // Invaluable sandbox environment hotfix: swallow non-blocking iframe errors before modules run
      window.addEventListener('error', function(event) {
        if (event && event.message && (
          event.message.includes("Cannot set property fetch") || 
          event.message.includes("is read-only") || 
          event.message.includes("has only a getter")
        )) {
          event.preventDefault();
          event.stopPropagation();
          console.warn("Swallowed sandbox fetch assignment warning:", event.message);
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
